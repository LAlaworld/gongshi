<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fffbeb">
<title>工时记录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="top-bar">
    <div class="top-bar-date" id="topBarDate">
      <div class="top-bar-date-main">
        <span class="top-bar-date-weekday"></span>
        <span class="top-bar-date-full"></span>
      </div>
      <span class="top-bar-date-lunar" id="topBarLunar"></span>
    </div>
    <div class="top-bar-weather" id="topBarWeather">
      <div class="weather-item weather-skeleton"><span class="weather-day"></span><span class="weather-icon"></span><span class="weather-temp"></span></div>
      <div class="weather-item weather-skeleton"><span class="weather-day"></span><span class="weather-icon"></span><span class="weather-temp"></span></div>
      <div class="weather-item weather-skeleton"><span class="weather-day"></span><span class="weather-icon"></span><span class="weather-temp"></span></div>
    </div>
  </div>

  <header>
    <h1>工时记录</h1>
    <p>当前：<span class="current-user-tag" id="currentUserTag">—</span> <span class="switch-account-link" id="switchAccountLink">切换账号</span></p>
  </header>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">今日工时</div>
      <div class="stat-date" id="todayRange"></div>
      <div>
        <span class="stat-value" id="todayHours">0</span>
        <span class="stat-unit">小时</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">本周工时</div>
      <div class="stat-date" id="weekRangeText"></div>
      <div>
        <span class="stat-value" id="weekHours">0</span>
        <span class="stat-unit">小时</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">本月工时</div>
      <div class="stat-date" id="monthRangeText"></div>
      <div>
        <span class="stat-value" id="monthHours">0</span>
        <span class="stat-unit">小时</span>
      </div>
    </div>
  </div>

  <div class="section-header">
    <h2 class="section-title">工时明细</h2>
    <div class="tool-btns">
      <button class="export-btn" id="exportBtn" title="导出 CSV">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        导出
      </button>
      <button class="export-btn" id="importBtn" title="导入 CSV">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
        </svg>
        导入
      </button>
    </div>
    <input type="file" id="importFile" accept=".csv" style="display:none">
  </div>

  <div class="filter-section">
    <div class="filter-group">
      <label>从</label>
      <input type="date" id="filterStartDate">
    </div>
    <span class="filter-sep">—</span>
    <div class="filter-group">
      <label>至</label>
      <input type="date" id="filterEndDate">
    </div>
    <div class="filter-total">
      <span class="filter-total-label">合计</span>
      <span class="filter-total-value" id="rangeTotal">0</span>
      <span class="filter-total-unit">小时</span>
    </div>
  </div>

  <div id="logList" class="log-list"></div>
</div>

<button class="add-btn" id="addBtn" title="新增工时记录" aria-label="新增工时记录">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
  </svg>
</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-drag-bar"></div>
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">新增工时记录</h2>
      <p class="modal-subtitle" id="modalSubtitle">记录你的工作时间</p>
    </div>
    <form id="addForm" autocomplete="off">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label" for="logDate">日期</label>
        <input type="date" id="logDate" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="hours">工时（小时）</label>
        <input type="number" id="hours" min="0" step="0.5" inputmode="decimal" pattern="[0-9]*" placeholder="例如：8" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="shift">班次 <span class="label-hint">（选填）</span></label>
        <select id="shift">
          <option value="">请选择班次</option>
          <option value="早班">早班</option>
          <option value="中班">中班</option>
          <option value="晚班">晚班</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="notes">备注 <span class="label-hint">（选填）</span></label>
        <textarea id="notes" placeholder="记录一下做了什么..."></textarea>
      </div>
      <div class="modal-actions" id="modalActions">
        <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
        <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none">删除</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">保存记录</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <h2 class="login-title">工时记录</h2>

    <!-- 密码设置（首次使用显示设置，后续只需输入） -->
    <div id="passwordSetup" style="display:none">
      <p class="login-desc" id="setupDesc">设置数据加密密码（用于云端同步加密，请牢记）</p>
      <input class="login-input" id="passwordInput" type="password" placeholder="设置密码" maxlength="50" autocomplete="off">
      <input class="login-input" id="passwordConfirm" type="password" placeholder="确认密码" maxlength="50" autocomplete="off" style="margin-top:8px">
      <button class="login-btn" id="setupPasswordBtn">确认</button>
      <p class="login-error" id="passwordError"></p>
    </div>

    <!-- 账号登录 -->
    <div id="accountLogin">
      <p class="login-desc">请输入你的账号</p>
      <input class="login-input" id="loginInput" placeholder="输入账号名" maxlength="20" autocomplete="off">
      <button class="login-btn" id="loginBtn">进入</button>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
