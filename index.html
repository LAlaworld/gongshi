<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#fffbeb">
<title>工时记录</title>
<link rel="icon" href="data:,">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <header>
    <h1>工时记录</h1>
    <div class="header-user-info">
      <div class="user-avatar" id="userAvatarInitial"></div>
      <div class="user-info-text">
        <span class="current-user-tag" id="currentUserTag">—</span>
        <button type="button" class="switch-account-link" id="switchAccountLink" aria-label="切换账号">切换账号</button>
      </div>
    </div>
    <div class="top-bar-date" id="topBarDate">
        <div class="top-bar-date-main">
          <span class="top-bar-date-weekday"></span>
          <span class="top-bar-date-full"></span>
        </div>
        <span class="top-bar-date-lunar" id="topBarLunar"></span>
      </div>
    <span class="top-bar-weather" id="topBarWeather"></span>
  </header>

  <div class="stats-grid">
    <div class="stat-card" id="todayStatCard" role="button" aria-label="点击新增或编辑今日工时记录" tabindex="0">
      <div class="stat-label">今日工时 <span class="tap-hint">可点击</span></div>
      <div class="stat-date" id="todayRange"></div>
      <div>
        <span class="stat-value" id="todayHours">0</span>
        <span class="stat-unit">小时</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">本周工时</div>
      <div class="stat-date" id="weekRangeText"></div>
      <div>
        <span class="stat-value" id="weekHours">0</span>
        <span class="stat-unit">小时</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">本月工时</div>
      <div class="stat-date" id="monthRangeText"></div>
      <div>
        <span class="stat-value" id="monthHours">0</span>
        <span class="stat-unit">小时</span>
      </div>
    </div>
  </div>

  <div class="section-header">
    <h2 class="section-title">工时明细</h2>
    <div class="tool-btns">
      <button class="export-btn" id="analysisBtn" title="工时分析">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        分析
      </button>
      <button class="export-btn" id="exportBtn" title="导出 CSV">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
        </svg>
        导出
      </button>
      <button class="export-btn" id="importBtn" title="导入 CSV">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        导入
      </button>
    </div>
    <input type="file" id="importFile" accept=".csv" style="display:none">
  </div>

  <div class="filter-section">
    <div class="filter-group">
      <label for="filterStartDate">从</label>
      <input type="date" id="filterStartDate" name="filterStartDate" autocomplete="off">
    </div>
    <span class="filter-sep">—</span>
    <div class="filter-group">
      <label for="filterEndDate">至</label>
      <input type="date" id="filterEndDate" name="filterEndDate" autocomplete="off">
    </div>
    <div class="filter-total">
      <span class="filter-total-label">合计</span>
      <span class="filter-total-value" id="rangeTotal">0</span>
      <span class="filter-total-unit">小时</span>
    </div>
  </div>

  <div id="logList" class="log-list"></div>

  <div class="version-footer"></div>
</div>

<button class="add-btn" id="addBtn" title="新增工时记录" aria-label="新增工时记录">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
  </svg>
</button>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <div class="modal-drag-bar"></div>
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">新增工时记录</h2>
      <p class="modal-subtitle" id="modalSubtitle">记录你的工作时间</p>
    </div>
    <form id="addForm" autocomplete="off">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label" for="logDate">日期</label>
        <input type="date" id="logDate" required aria-required="true">
      </div>
      <div class="form-group">
        <label class="form-label" for="hours">工时（小时）</label>
        <input type="number" id="hours" min="0" step="0.5" inputmode="decimal" pattern="[0-9]*" placeholder="例如：8" required aria-required="true">
      </div>
      <div class="form-group">
        <label class="form-label" for="shift">班次 <span class="label-hint">（选填）</span></label>
        <select id="shift" aria-label="选择班次">
          <option value="">请选择班次</option>
          <option value="早班">早班</option>
          <option value="中班">中班</option>
          <option value="晚班">晚班</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="notes">备注 <span class="label-hint">（选填）</span></label>
        <textarea id="notes" placeholder="记录一下做了什么..." aria-label="备注"></textarea>
      </div>
      <div class="modal-actions" id="modalActions">
        <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
        <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none" aria-label="删除此记录">删除</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">保存记录</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<div class="modal-overlay" id="analysisModalOverlay" role="dialog" aria-modal="true" aria-label="工时分析">
  <div class="modal analysis-modal">
    <div class="modal-drag-bar"></div>
    <div class="modal-header">
      <h2 class="modal-title">工时分析</h2>
      <p class="modal-subtitle" id="analysisSubtitle">当月每日工时</p>
    </div>
    <div class="chart-mode-switch" id="chartModeSwitch" role="tablist" aria-label="图表时间范围">
      <button class="chart-mode-btn active" data-mode="month" role="tab" aria-selected="true">当月</button>
      <button class="chart-mode-btn" data-mode="year" role="tab" aria-selected="false">当年</button>
    </div>
    <div class="chart-summary" id="chartSummary" aria-live="polite"></div>
    <div class="chart-canvas-wrap">
      <canvas id="workChart" width="700" height="300" role="img" aria-label="工时图表"></canvas>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="analysisCloseBtn">关闭</button>
    </div>
  </div>
</div>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <h2 class="login-title">工时记录</h2>
    <p class="login-desc">请输入你的账号</p>
    <input class="login-input" id="loginInput" placeholder="输入账号名" maxlength="20" autocomplete="off">
    <button class="login-btn" id="loginBtn">进入</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    let refreshing = false;
    // 当新的 SW 接管页面时，自动刷新
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });

    navigator.serviceWorker.register('sw.js').then(reg => {
      // 每次打开页面强制检查 SW 更新（绕过浏览器 24h 限制）
      reg.update();
    });

    // 页面可见时也检查一下
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        navigator.serviceWorker.getRegistration().then(reg => { if (reg) reg.update(); });
      }
    });
  }
</script>
</body>
</html>
