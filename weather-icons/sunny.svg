<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Sun circle -->
  <circle cx="32" cy="32" r="10" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 8 rays evenly spaced -->
  <line x1="32" y1="8" x2="32" y2="16" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="56" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="32" x2="16" y2="32" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="56" y2="32" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diagonal rays at 45° -->
  <line x1="15.2" y1="15.2" x2="20.9" y2="20.9" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43.1" y1="43.1" x2="48.8" y2="48.8" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48.8" y1="15.2" x2="43.1" y2="20.9" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15.2" y1="48.8" x2="20.9" y2="43.1" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
</svg>